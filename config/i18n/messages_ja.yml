  limit_reached: "コスト上限に達しました"
  daily_limit: "日次コスト上限: {limit}ドル"
  cycle_limit: "サイクルコスト上限: {limit}ドル"
  current_usage: "現在の使用量: {amount}ドル"

# ── LLMゲートウェイ ──
llm:
  mode:
    cloud: "クラウド"
    local: "ローカル"
