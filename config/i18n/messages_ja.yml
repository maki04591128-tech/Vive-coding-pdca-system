    blocker: "ブロッカー"
    major: "重大"
    minor: "軽微"
  category:
    correctness: "正しさ"
    security: "セキュリティ"
    performance: "性能"
    ux: "UX"
    docs: "ドキュメント"
    testing: "テスト"
    ops: "運用"
  result:
    accept: "承認"
    reject: "差し戻し"
    defer: "保留"

