# =============================================================
# 本番環境用設定（config/default.yml を上書き）
# =============================================================

llm:
  preferred_mode: "cloud"
  auto_fallback: true

  circuit_breaker:
    failure_threshold: 3
    recovery_timeout: 120.0     # 本番は長めに待機して復旧を待つ
    success_threshold: 3        # 本番は厳しめに復旧確認

  health_check:
    interval: 15.0              # 本番は短めのインターバル

  cost:
    daily_limit_usd: 30.0
    per_cycle_limit_usd: 5.0
    max_calls_per_cycle: 80
    max_calls_per_day: 500

logging:
  level: "INFO"
