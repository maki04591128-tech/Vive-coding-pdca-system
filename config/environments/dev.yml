# =============================================================
# 開発環境用設定（config/default.yml を上書き）
# =============================================================

llm:
  # 開発時はローカルLLMを優先してコスト削減
  preferred_mode: "local"
  auto_fallback: true

  circuit_breaker:
    failure_threshold: 2        # 開発時は早めにフォールバック
    recovery_timeout: 30.0

  health_check:
    interval: 60.0              # 開発時は長めのインターバル

  cost:
    daily_limit_usd: 10.0
    per_cycle_limit_usd: 2.0
    max_calls_per_cycle: 20
    max_calls_per_day: 100

logging:
  level: "DEBUG"
