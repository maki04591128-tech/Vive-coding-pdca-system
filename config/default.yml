# =============================================================
# vibe-pdca LLM ゲートウェイ デフォルト設定
# =============================================================
# ADR-001（マルチLLMモデル選定）準拠
# §17.5 ポリシー階層: グローバル → 環境別 → プロジェクト固有
# =============================================================

llm:
  # ── 動作モード ──
  # "cloud" : クラウドLLMを優先使用（デフォルト）
  # "local" : ローカルLLMを優先使用
  preferred_mode: "cloud"

  # クラウドLLM障害時にローカルLLMへ自動フォールバックするか
  auto_fallback: true

  # ── サーキットブレーカー設定 ──
  # クラウドLLM障害を検知しローカルへの自動切替を制御する
  circuit_breaker:
    failure_threshold: 3        # OPEN へ遷移する連続失敗回数
    recovery_timeout: 60.0      # OPEN→HALF_OPEN の待機秒数
    success_threshold: 2        # HALF_OPEN→CLOSED に必要な連続成功回数
    half_open_max_calls: 1      # HALF_OPEN 中の最大同時試行数

  # ── ヘルスチェック設定 ──
  health_check:
    interval: 30.0              # チェック間隔（秒）
    timeout: 10.0               # 1回あたりのタイムアウト（秒）
    internet_check_enabled: true

  # ── コスト管理 (§15.1) ──
  cost:
    daily_limit_usd: 30.0       # 日次コスト上限
    per_cycle_limit_usd: 5.0    # 1サイクルあたりコスト上限
    max_calls_per_cycle: 80     # 1サイクルあたり最大LLM呼び出し回数
    max_calls_per_day: 500      # 日次最大LLM呼び出し回数

  # ── クラウドLLMプロバイダ (ADR-001 選定結果) ──
  cloud_providers:
    # PM: GPT-5.1
    - name: "openai-gpt5.1"
      model: "gpt-5.1"
      api_key: "${OPENAI_API_KEY}"
      cost_per_1k_input: 0.01
      cost_per_1k_output: 0.03
      timeout: 120.0
      roles:
        - "pm"

    # サブPM/書記: Gemini 3 Pro
    - name: "google-gemini3-pro"
      model: "gemini-3-pro"
      api_key: "${GOOGLE_API_KEY}"
      base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
      cost_per_1k_input: 0.005
      cost_per_1k_output: 0.015
      timeout: 120.0
      roles:
        - "scribe"

    # プログラマ: Claude Opus 4
    - name: "anthropic-opus4"
      model: "claude-opus-4-20250514"
      api_key: "${ANTHROPIC_API_KEY}"
      cost_per_1k_input: 0.015
      cost_per_1k_output: 0.075
      timeout: 120.0
      roles:
        - "programmer"

    # デザイナ: Gemini 3.1 Pro
    - name: "google-gemini3.1-pro"
      model: "gemini-3.1-pro"
      api_key: "${GOOGLE_API_KEY}"
      base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
      cost_per_1k_input: 0.005
      cost_per_1k_output: 0.015
      timeout: 120.0
      roles:
        - "designer"

    # ユーザ: Grok 4
    - name: "xai-grok4"
      model: "grok-4"
      api_key: "${XAI_API_KEY}"
      base_url: "https://api.x.ai/v1"
      cost_per_1k_input: 0.003
      cost_per_1k_output: 0.015
      timeout: 120.0
      roles:
        - "user"

    # DO担当（実装）: Claude（確定）
    - name: "anthropic-claude-do"
      model: "claude-sonnet-4-20250514"
      api_key: "${ANTHROPIC_API_KEY}"
      cost_per_1k_input: 0.003
      cost_per_1k_output: 0.015
      timeout: 180.0
      roles:
        - "do"

  # ── ローカルLLMプロバイダ（手動切替 / フォールバック先） ──
  # preferred_mode: "local" または環境変数 VIBE_PDCA_LLM_MODE=local で優先使用可能
  # モデル差し替え: 環境変数 VIBE_PDCA_LOCAL_LLM_MODEL で全プロバイダのモデルを一括変更可能
  # URL差し替え:   環境変数 VIBE_PDCA_LOCAL_LLM_BASE_URL で接続先サーバーを変更可能
  local_providers:
    # Ollama (汎用フォールバック)
    - name: "ollama-llama3.3"
      model: "llama3.3:70b"
      base_url: "http://localhost:11434/v1"
      timeout: 300.0
      roles:
        - "pm"
        - "scribe"
        - "programmer"
        - "designer"
        - "user"
        - "do"

    # 軽量モデル（応急用）
    - name: "ollama-qwen2.5"
      model: "qwen2.5:32b"
      base_url: "http://localhost:11434/v1"
      timeout: 300.0
      roles:
        - "pm"
        - "scribe"
        - "designer"
        - "user"

# ── ログ設定 ──
logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
