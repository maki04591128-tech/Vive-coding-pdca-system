# Dependabot 設定 — 依存パッケージの自動更新
# ※ セキュリティアップデートと定期更新を自動でPR作成します
version: 2
updates:
  # --- Python (pip) の依存更新 ---
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 5

  # --- GitHub Actions の更新 ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
