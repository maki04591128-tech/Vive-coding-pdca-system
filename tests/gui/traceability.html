<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>トレーサビリティマップ – Vibe PDCA システム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ナビゲーション -->
  <nav class="nav-bar">
    <a href="index.html" class="nav-link">📊 ダッシュボード</a>
    <a href="goal.html" class="nav-link">🎯 ゴール入力</a>
    <a href="progress.html" class="nav-link">📈 進捗</a>
    <a href="intervention.html" class="nav-link">🛑 介入</a>
    <a href="alerts.html" class="nav-link">🔔 アラート</a>
    <a href="traceability.html" class="nav-link active">🗺️ トレーサビリティ</a>
    <a href="cost-trend.html" class="nav-link">💹 コスト推移</a>
    <a href="persona-radar.html" class="nav-link">🕸️ ペルソナ</a>
    <a href="settings.html" class="nav-link">⚙️ 設定</a>
  </nav>

  <!-- ヘッダー -->
  <div class="header">
    <div class="header-left">
      <span class="icon">🗺️</span>
      <span class="title">トレーサビリティマップ</span>
    </div>
  </div>
  <div class="divider"></div>

  <div class="trace-section">

    <!-- フィルター -->
    <div class="card filter-bar">
      <div class="filter-row">
        <div class="filter-group">
          <span class="filter-label">表示:</span>
          <label class="filter-chip active" data-show="all"><input type="checkbox" checked> すべて</label>
          <label class="filter-chip" data-show="goal"><input type="checkbox"> 🎯 ゴール</label>
          <label class="filter-chip" data-show="milestone"><input type="checkbox"> 🏁 マイルストーン</label>
          <label class="filter-chip" data-show="task"><input type="checkbox"> 📝 タスク</label>
          <label class="filter-chip" data-show="pr"><input type="checkbox"> 🔀 PR</label>
          <label class="filter-chip" data-show="decision"><input type="checkbox"> ⚖️ 判定</label>
        </div>
      </div>
    </div>

    <!-- トレーサビリティグラフ -->
    <div class="card">
      <div class="card-title">🔗 関係グラフ</div>
      <div class="card-divider"></div>
      <div class="trace-graph" id="traceGraph">
        <svg id="traceSvg" width="100%" height="500">
          <!-- rendered by JS -->
        </svg>
      </div>
    </div>

    <!-- 詳細パネル -->
    <div class="card">
      <div class="card-title">📄 詳細</div>
      <div class="card-divider"></div>
      <div id="traceDetail" class="placeholder-text">
        ノードをクリックして詳細を表示
      </div>
    </div>

    <!-- リレーション一覧 -->
    <div class="card">
      <div class="card-title">📊 リレーション一覧</div>
      <div class="card-divider"></div>
      <table class="trace-table" id="traceTable">
        <thead>
          <tr>
            <th>ソース</th>
            <th>→</th>
            <th>ターゲット</th>
            <th>種別</th>
          </tr>
        </thead>
        <tbody id="traceTableBody">
          <!-- rendered by JS -->
        </tbody>
      </table>
    </div>

  </div>

  <!-- デモ操作ボタン -->
  <div class="demo-controls">
    <button class="demo-btn" id="btnAddRelation">🔗 リレーション追加</button>
    <button class="demo-btn" id="btnResetGraph">🔄 リセット</button>
  </div>

  <!-- ログ領域 -->
  <div class="log-section">
    <div class="log-title">📋 ログ</div>
    <div class="log-container" id="logContainer"></div>
  </div>

  <script src="traceability.js"></script>
</body>
</html>
